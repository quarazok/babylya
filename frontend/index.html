<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Team DevStars</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>⭐ Команда DevStars ⭐</h1>

    <!-- Секция куда придут данные из API -->
    <section id="team-section">
        <h2>Наша команда</h2>
        <div id="team-cards">Загрузка...</div>
    </section>

    <script>
        // Адрес API – замените PORT на реальный номер порта из Visual Studio
        const API_URL = 'http://localhost:5043/api/team';

        async function loadTeam() {
            try {
                const response = await fetch(API_URL);
                const members = await response.json();

                const container = document.getElementById('team-cards');
                container.innerHTML = members.map(m => `
                    <div class="card">
                        <h3>${m.name}</h3>
                        <p><strong>${m.role}</strong></p>
                        <p>${m.fact}</p>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('team-cards').innerHTML = '<div class="error">❌ API недоступен. Запусти бэкенд командой: dotnet run</div>';
            }
        }

        loadTeam();
    </script>
</body>
</html>
